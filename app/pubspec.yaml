name: lenscape
description: "镜界 Lenscape — AI 拍摄指导 APP（仅拍摄前指导）"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理 / 路由 / 网络
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0

  # 本地持久化（收藏 / 历史 / 缓存）
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 分享拍摄指导（系统分享面板）
  share_plus: ^10.1.4

  # 不可变模型 / 序列化注解
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 代码生成（Hive 用手写 JSON 持久化，不需要 hive_generator）
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  # 本地静态数据与图片资产（见 docs/data-model.md、docs/architecture.md §3.4）
  assets:
    - assets/data/
    - assets/images/styles/
    - assets/images/scenes/
    - assets/images/poses/
