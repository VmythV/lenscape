name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: 后端代理 (server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  app:
    name: 客户端 (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # 数据/推荐/网关/持久化/e2e 与构建期数据校验门禁均在 flutter test 中
      - run: flutter analyze
      - run: flutter test
